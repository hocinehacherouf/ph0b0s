# cargo-deny config — supply chain + license hygiene for ph0b0s.
#
# Vendor-coupling is NOT enforced here. That's the job of `xtask check-vendor`,
# which scans `use` statements at the source level. cargo-deny operates on the
# resolved dependency graph, where every workspace member transitively pulls in
# the same vendor crates via `adk-rust`; banning at the graph level would also
# block the legitimate adapter and CLI usages.

[graph]
all-features = true

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked  = "deny"
# Documented advisories that don't apply to ph0b0s' usage paths.
ignore = [
    # `time 0.3.45` — RFC 2822 parsing DoS. We don't parse RFC 2822; the
    # crate is transitive via adk-anthropic / adk-gemini / aws-sdk for
    # RFC 3339 API timestamps.
    "RUSTSEC-2026-0009",
    # Unmaintained-warnings: `instant`, `backoff`. Both transitive via the
    # adk-* / AWS SDK stack; tracked but not actionable until upstream
    # migrates. Re-evaluate at each adk-rust bump.
    "RUSTSEC-2024-0384",
    "RUSTSEC-2025-0012",
]

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-roots ships under CDLA-Permissive-2.0 (community data license).
    "CDLA-Permissive-2.0",
]

[bans]
# Duplicate versions in the AWS SDK / adk-rust dep graph are noise we can't
# fix from here; surface as warnings only.
multiple-versions = "warn"
wildcards         = "deny"

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
