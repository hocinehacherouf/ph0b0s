name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        # `libdbus-sys` (transitive via adk-rust → secret/keyring backends)
        # needs the dbus C library on Linux. macOS has Keychain instead.
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ph0b0s

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --all-features

      - name: vendor-coupling fitness function
        run: cargo run -p xtask -- check-vendor

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Use the latest stable rustc for the dependency graph parse;
          # the workspace MSRV is 1.85 in `Cargo.toml` (workspace.package),
          # but transitive deps (AWS SDK via adk-rust) need newer rustc to
          # compile. cargo-deny only resolves and inspects the graph, so
          # using stable here is correct and avoids MSRV-resolver failures.
          rust-version: stable

  coverage:
    # Generates LCOV via cargo-llvm-cov (works on stable, unlike the
    # nightly-only `-Zprofile` + grcov approach in the official codecov
    # example) and uploads to Codecov.
    #
    # For public repos on GitHub, codecov-action@v5 uses OIDC and does
    # not require a token. Private repos must set the `CODECOV_TOKEN`
    # repo secret.
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        # See `test` job comment — libdbus-sys is transitive via adk-rust.
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ph0b0s-coverage

      - name: Generate coverage (lcov)
        # `--ignore-filename-regex` mirrors the `ignore:` block in
        # `codecov.yml` so the number cargo-llvm-cov reports locally
        # matches what Codecov displays.
        run: |
          cargo llvm-cov --workspace --all-features \
            --ignore-filename-regex 'xtask|/tests/|fixtures/|ph0b0s-test-support|ph0b0s-cli/src/(main|workspace)\.rs' \
            --lcov --output-path lcov.info

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hocinehacherouf/ph0b0s
          files: lcov.info
          fail_ci_if_error: true
          verbose: true

  # Sanity job that runs the binary's --help on a clean checkout so the
  # release artefact is always at least invokable. Catches packaging
  # regressions that unit + integration tests miss.
  smoke:
    name: smoke (--help)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ph0b0s
      - name: cargo build --release ph0b0s-cli
        run: cargo build --release -p ph0b0s-cli
      - name: ph0b0s --help
        run: ./target/release/ph0b0s --help

  live-ollama:
    name: live (ollama)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ph0b0s-live-ollama
      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ runner.os }}-qwen2.5-coder-0.5b
      - name: Install + start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null; then
              echo "ollama up"
              exit 0
            fi
            sleep 1
          done
          echo "ollama failed to start"
          tail /tmp/ollama.log
          exit 1
      - name: Pull model
        run: ollama pull qwen2.5-coder:0.5b
      - name: Run live tests
        env:
          OLLAMA_HOST: http://localhost:11434
          PH0B0S_LIVE_OLLAMA_MODEL: qwen2.5-coder:0.5b
        run: cargo test -p ph0b0s-llm-adk --test ollama_live -- --include-ignored
